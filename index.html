<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Engineer Training</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --bg2: #1a1a1a;
      --green: #00ff88;
      --green-dim: #00cc66;
      --grey: #444;
      --text: #cccccc;
      --font: 'Courier New', Courier, monospace;
      --code-bg: #111;
      --code-border: #333;
      --challenge-bg: #111a11;
      --hint-text: #aaa;
      --warn: #ff8844;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    h1 {
      color: var(--green);
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: var(--grey);
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }
    /* Progress bar */
    .progress-wrap {
      margin-bottom: 2.5rem;
    }
    .progress-label {
      color: var(--green-dim);
      font-size: 0.8rem;
      margin-bottom: 0.4rem;
    }
    .progress-bar-bg {
      background: var(--bg2);
      border: 1px solid var(--grey);
      height: 12px;
      border-radius: 6px;
      overflow: hidden;
    }
    .progress-bar-fill {
      background: var(--green);
      height: 100%;
      border-radius: 6px;
      transition: width 0.4s ease;
      width: 0%;
    }
    /* Module cards */
    .module {
      background: var(--bg2);
      border: 1px solid var(--grey);
      border-radius: 8px;
      margin-bottom: 1.5rem;
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .module.unlocked {
      border-color: var(--green-dim);
    }
    .module.locked {
      opacity: 0.45;
      pointer-events: none;
    }
    .module-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.2rem;
      cursor: pointer;
      user-select: none;
    }
    .module-title {
      color: var(--green);
      font-size: 1rem;
    }
    .module-status {
      font-size: 0.8rem;
      color: var(--grey);
    }
    .module.done .module-status { color: var(--green); }
    .module-body {
      padding: 0 1.2rem 1.2rem;
      display: none;
    }
    .module.open .module-body { display: block; }
    p { margin: 0.8rem 0; line-height: 1.6; font-size: 0.9rem; }
    h3 { color: var(--green-dim); margin: 1.2rem 0 0.5rem; font-size: 0.95rem; }
    /* Code blocks */
    .code-block {
      position: relative;
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      border-radius: 4px;
      margin: 0.8rem 0;
    }
    .code-block pre {
      padding: 0.8rem 1rem;
      overflow-x: auto;
      font-size: 0.85rem;
      color: var(--green);
      line-height: 1.5;
    }
    .copy-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      background: var(--grey);
      color: #fff;
      border: none;
      border-radius: 3px;
      padding: 2px 8px;
      font-size: 0.7rem;
      cursor: pointer;
      font-family: var(--font);
    }
    .copy-btn:hover { background: var(--green-dim); color: #000; }
    /* Challenge section */
    .challenge {
      background: var(--challenge-bg);
      border-left: 3px solid var(--green);
      border-radius: 0 4px 4px 0;
      padding: 0.8rem 1rem;
      margin: 1rem 0;
    }
    .challenge-title {
      color: var(--green);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.4rem;
    }
    /* Hint */
    .hint-toggle {
      background: none;
      border: 1px solid var(--grey);
      color: var(--grey);
      border-radius: 4px;
      padding: 3px 10px;
      font-size: 0.75rem;
      cursor: pointer;
      font-family: var(--font);
      margin-top: 0.6rem;
    }
    .hint-toggle:hover { border-color: var(--green-dim); color: var(--green-dim); }
    .hint-body {
      display: none;
      margin-top: 0.6rem;
      font-size: 0.85rem;
      color: var(--hint-text);
      line-height: 1.6;
    }
    .hint-body.visible { display: block; }
    /* Mark done button */
    .mark-done-btn {
      display: block;
      width: 100%;
      margin-top: 1.2rem;
      padding: 0.7rem;
      background: none;
      border: 2px solid var(--green);
      color: var(--green);
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      font-family: var(--font);
      transition: background 0.2s, color 0.2s;
    }
    .mark-done-btn:hover { background: var(--green); color: #000; }
    .mark-done-btn:disabled {
      border-color: var(--grey);
      color: var(--grey);
      cursor: default;
      background: none;
    }
    /* localStorage warning */
    .ls-warning {
      color: var(--warn);
      font-size: 0.75rem;
      padding: 0.5rem;
      border: 1px solid var(--warn);
      border-radius: 4px;
      margin-bottom: 1rem;
      display: none;
    }
    /* ── Quiz ─────────────────────────────────────────────────────── */
    .quiz-section { margin-top: 1.2rem; }
    .quiz-question { color: var(--text); font-size: 0.9rem; margin-bottom: 0.8rem; line-height: 1.6; }
    .quiz-options { display: flex; flex-direction: column; gap: 0.5rem; }
    .quiz-option {
      background: none;
      border: 1px solid var(--grey);
      color: var(--text);
      border-radius: 4px;
      padding: 0.5rem 0.8rem;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: var(--font);
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
    }
    .quiz-option:hover { border-color: var(--green-dim); color: var(--green-dim); }
    .quiz-option.correct {
      border-color: var(--green);
      background: rgba(0,255,136,0.1);
      color: var(--green);
      animation: flashGreen 0.4s ease;
    }
    .quiz-option.wrong {
      border-color: var(--warn);
      background: rgba(255,136,68,0.1);
      color: var(--warn);
      animation: flashRed 0.4s ease;
    }
    @keyframes flashGreen {
      0% { background: rgba(0,255,136,0.4); }
      100% { background: rgba(0,255,136,0.1); }
    }
    @keyframes flashRed {
      0% { background: rgba(255,136,68,0.4); }
      100% { background: rgba(255,136,68,0.1); }
    }
    .quiz-passed {
      color: var(--green);
      font-size: 0.85rem;
      padding: 0.4rem 0;
    }
    .quiz-progress { color: var(--grey); font-size: 0.75rem; margin-bottom: 0.6rem; }
    /* ── Idea box ──────────────────────────────────────────────────── */
    .idea-box {
      margin-top: 1.2rem;
      border-top: 1px solid var(--grey);
      padding-top: 1rem;
    }
    .idea-prompt { color: var(--green-dim); font-size: 0.85rem; margin-bottom: 0.6rem; }
    .idea-textarea {
      width: 100%;
      background: var(--code-bg);
      border: 1px solid var(--grey);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.85rem;
      padding: 0.6rem 0.8rem;
      resize: vertical;
      min-height: 60px;
    }
    .idea-textarea:focus { outline: none; border-color: var(--green-dim); }
    .idea-send-btn {
      margin-top: 0.5rem;
      background: none;
      border: 1px solid var(--green-dim);
      color: var(--green-dim);
      border-radius: 4px;
      padding: 0.3rem 0.9rem;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: var(--font);
    }
    .idea-send-btn:hover { background: var(--green-dim); color: #000; }
    .idea-response {
      margin-top: 0.6rem;
      font-size: 0.85rem;
      color: var(--hint-text);
      line-height: 1.6;
      font-style: italic;
      display: none;
    }
    .idea-locked { color: var(--grey); font-size: 0.8rem; margin-top: 0.5rem; }
    /* ── Ask bar ───────────────────────────────────────────────────── */
    .ask-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--code-bg);
      border-top: 1px solid var(--green-dim);
      padding: 0.6rem 1rem;
      z-index: 100;
    }
    .ask-bar-inner { max-width: 800px; margin: 0 auto; }
    .ask-bar-label { color: var(--green-dim); font-size: 0.7rem; margin-bottom: 0.4rem; }
    .ask-bar-row { display: flex; gap: 0.5rem; }
    .ask-bar-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--grey);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.85rem;
      padding: 0.4rem 0.7rem;
    }
    .ask-bar-input:focus { outline: none; border-color: var(--green-dim); }
    .ask-bar-btn {
      background: none;
      border: 1px solid var(--green);
      color: var(--green);
      border-radius: 4px;
      padding: 0.4rem 0.9rem;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: var(--font);
      white-space: nowrap;
    }
    .ask-bar-btn:hover { background: var(--green); color: #000; }
    .ask-bar-btn:disabled { border-color: var(--grey); color: var(--grey); cursor: default; }
    .ask-responses {
      max-width: 800px;
      margin: 0 auto 0.5rem;
    }
    .ask-response-item {
      background: var(--bg2);
      border: 1px solid var(--grey);
      border-radius: 4px;
      padding: 0.6rem 0.8rem;
      margin-bottom: 0.4rem;
      font-size: 0.85rem;
      color: var(--text);
      line-height: 1.6;
    }
    .ask-response-q { color: var(--green-dim); font-size: 0.75rem; margin-bottom: 0.3rem; }
    .ask-error { color: var(--warn); font-size: 0.8rem; margin-top: 0.3rem; }
    /* padding so content doesn't hide behind fixed bar */
    body.ask-bar-visible { padding-bottom: 120px; }
  </style>
</head>
<body>
  <header>
    <h1>&gt; AI Engineer Training</h1>
    <p class="subtitle">10 missions. Complete them in order. No skipping.</p>
  </header>
  <div class="ls-warning" id="ls-warning">
    Warning: progress won't be saved in private/incognito mode.
  </div>
  <div class="progress-wrap">
    <div class="progress-label" id="progress-label">0 of 0 modules complete</div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Tutorial progress"></div>
    </div>
  </div>
  <div id="modules-container"></div>
  <div class="ask-bar" id="ask-bar" style="display:none" aria-label="Ask Claude anything">
    <div class="ask-responses" id="ask-responses"></div>
    <div class="ask-bar-inner">
      <div class="ask-bar-label" id="ask-bar-label">Ask Claude anything about what you learned →</div>
      <div class="ask-bar-row">
        <input class="ask-bar-input" id="ask-bar-input" type="text"
          placeholder="Type a question..." autocomplete="off" />
        <button class="ask-bar-btn" id="ask-bar-btn" onclick="handleAskBar()">Ask →</button>
      </div>
      <div class="ask-error" id="ask-error" style="display:none"></div>
    </div>
  </div>
  <script>
    // ── Storage ──────────────────────────────────────────────────────
    let lsAvailable = true;
    try { localStorage.setItem('_test', '1'); localStorage.removeItem('_test'); }
    catch(e) { lsAvailable = false; document.getElementById('ls-warning').style.display = 'block'; }

    function getProgress() {
      if (!lsAvailable) return {};
      try { return JSON.parse(localStorage.getItem('tutorialProgress') || '{}'); }
      catch(e) { return {}; }
    }
    function saveProgress(moduleId) {
      if (!lsAvailable) return;
      const p = getProgress();
      p[moduleId] = true;
      localStorage.setItem('tutorialProgress', JSON.stringify(p));
    }

    // ── Quiz state (in-memory, resets on page refresh) ────────────────
    const quizState = {}; // { moduleId: currentQuestionIndex }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ── Claude API utility ────────────────────────────────────────────
    async function callClaude(userMessage, systemPrompt, maxTokens) {
      const apiKey = localStorage.getItem('anthropicKey');
      if (!apiKey) throw new Error('no-key');
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: maxTokens,
          system: systemPrompt,
          messages: [{ role: 'user', content: userMessage }]
        })
      });
      if (!response.ok) {
        const errBody = await response.json().catch(() => ({}));
        throw new Error(`api-error-${response.status}`);
      }
      const data = await response.json();
      const text = data?.content?.[0]?.text;
      if (typeof text !== 'string') throw new Error('api-error:unexpected-response');
      return text;
    }

    // ── Module definitions (content added in Tasks 3-7) ──────────────
    const MODULES = [
      {
        id: 'm1',
        title: 'The Terminal',
        content: `
          <p>The terminal is how you talk directly to your computer — no buttons, just text.
          Every AI engineer uses it every day. Let's learn the basics.</p>

          <h3>Open a terminal</h3>
          <p>On Ubuntu: press <strong style="color:var(--green)">Ctrl + Alt + T</strong>.
          A black window with a blinking cursor appears. That's your terminal.</p>

          <h3>Commands to learn</h3>
          <p><code style="color:var(--green)">pwd</code> — prints where you are (your current folder)</p>
          <div class="code-block">
            <pre>pwd</pre>
            <button class="copy-btn" onclick="copyCode(this)">copy</button>
          </div>
          <p><code style="color:var(--green)">ls</code> — lists everything in the current folder</p>
          <div class="code-block">
            <pre>ls</pre>
            <button class="copy-btn" onclick="copyCode(this)">copy</button>
          </div>
          <p><code style="color:var(--green)">mkdir</code> — makes a new folder</p>
          <div class="code-block">
            <pre>mkdir ai-lab</pre>
            <button class="copy-btn" onclick="copyCode(this)">copy</button>
          </div>
          <p><code style="color:var(--green)">cd</code> — moves you into a folder</p>
          <div class="code-block">
            <pre>cd ai-lab</pre>
            <button class="copy-btn" onclick="copyCode(this)">copy</button>
          </div>
          <p>Run your first Python line:</p>
          <div class="code-block">
            <pre>python3 -c "print('hello world')"</pre>
            <button class="copy-btn" onclick="copyCode(this)">copy</button>
          </div>

          <div class="challenge">
            <div class="challenge-title">⚡ Mission 1 Challenge</div>
            <p>1. Open a terminal.<br>
            2. Create a folder called <strong>ai-lab</strong>.<br>
            3. Go inside it with <code>cd ai-lab</code>.<br>
            4. Run <code>ls</code> — it should show nothing (empty folder).<br>
            5. Run <code>python3 -c "print('I am an AI engineer')"</code></p>
            <p>When you see your message printed, come back here and mark it done.</p>
            <button class="hint-toggle" onclick="toggleHint(this)">show hint</button>
            <div class="hint-body">
              Open terminal with Ctrl+Alt+T, then type each command and press Enter:<br><br>
              <code style="color:var(--green)">mkdir ai-lab</code><br>
              <code style="color:var(--green)">cd ai-lab</code><br>
              <code style="color:var(--green)">ls</code><br>
              <code style="color:var(--green)">python3 -c "print('I am an AI engineer')"</code>
            </div>
          </div>
        `,
        quiz: [
          { q: 'What command shows your current folder?', options: ['ls', 'pwd', 'cd', 'mkdir'], answer: 1 },
          { q: 'What command creates a new folder called ai-lab?', options: ['pwd ai-lab', 'cd ai-lab', 'mkdir ai-lab', 'touch ai-lab'], answer: 2 },
          { q: 'How do you run a Python script called hello.py?', options: ['run hello.py', 'python3 hello.py', 'start hello.py', 'execute hello.py'], answer: 1 }
        ]
      },
      {
        id: 'm2',
        title: 'Python in 30 min',
        content: `
          <p>Python is the language of AI. It reads almost like English. Let's learn just
          enough to do real things.</p>

          <h3>Variables — storing information</h3>
          <div class="code-block">
            <pre>name = "Ada"
age = 13
print(name, "is", age, "years old")</pre>
            <button class="copy-btn" onclick="copyCode(this)">copy</button>
          </div>

          <h3>Functions — reusable blocks of code</h3>
          <div class="code-block">
            <pre>def greet(name):
    print("Hello,", name)

greet("Ada")
greet("World")</pre>
            <button class="copy-btn" onclick="copyCode(this)">copy</button>
          </div>

          <h3>Loops — doing things many times</h3>
          <div class="code-block">
            <pre>for i in range(5):
    print("Line", i)</pre>
            <button class="copy-btn" onclick="copyCode(this)">copy</button>
          </div>

          <h3>Input — asking the user something</h3>
          <div class="code-block">
            <pre>name = input("What is your name? ")
print("Welcome,", name)</pre>
            <button class="copy-btn" onclick="copyCode(this)">copy</button>
          </div>

          <h3>How to run a Python file</h3>
          <p>Save your code in a file called <code style="color:var(--green)">hello.py</code>,
          then run it:</p>
          <div class="code-block">
            <pre>python3 hello.py</pre>
            <button class="copy-btn" onclick="copyCode(this)">copy</button>
          </div>

          <div class="challenge">
            <div class="challenge-title">⚡ Mission 2 Challenge</div>
            <p>Inside your <strong>ai-lab</strong> folder, create a file called
            <strong>hello.py</strong> with this code:</p>
            <div class="code-block">
              <pre>name = input("What is your name? ")
print("Hello,", name + "! You are training to be an AI engineer.")</pre>
              <button class="copy-btn" onclick="copyCode(this)">copy</button>
            </div>
            <p>Run it with <code>python3 hello.py</code>. Enter your name when it asks.
            See your message? Come back and mark it done.</p>
            <button class="hint-toggle" onclick="toggleHint(this)">show hint</button>
            <div class="hint-body">
              To create the file, open a text editor:<br><br>
              <code style="color:var(--green)">cd ai-lab</code><br>
              <code style="color:var(--green)">nano hello.py</code><br><br>
              Type or paste the code. Save with Ctrl+O, Enter, then exit with Ctrl+X.<br>
              Then run: <code style="color:var(--green)">python3 hello.py</code>
            </div>
          </div>
        `,
        quiz: [
          { q: 'Which keyword defines a function in Python?', options: ['func', 'define', 'def', 'function'], answer: 2 },
          { q: 'What does input() do?', options: ['Prints text to the screen', 'Asks the user to type something', 'Creates a variable', 'Loops forever'], answer: 1 },
          { q: 'What is the output of: print(2 + 3)?', options: ['23', '2+3', '5', 'Error'], answer: 2 }
        ]
      },
      {
        id: 'm3',
        title: 'What is AI?',
        content: `
          <p>Before we talk to AI with code, let's understand what AI actually is.
          Spoiler: it's not magic, and it's not a robot brain.</p>

          <h3>The autocomplete analogy</h3>
          <p>You know how your phone suggests the next word when you type a message?
          AI language models (like Claude or ChatGPT) are like that, but trained on almost
          every book, article, and website ever written. They get very good at predicting
          what a helpful, smart answer looks like.</p>

          <h3>What is a prompt?</h3>
          <p>A <strong style="color:var(--green)">prompt</strong> is the message you send to an AI.
          The AI reads your prompt and generates a response. The better your prompt,
          the better the response. This skill is called <em>prompt engineering</em>.</p>

          <h3>What is an API?</h3>
          <p>An <strong style="color:var(--green)">API</strong> (Application Programming Interface)
          is a way for programs to talk to each other. Instead of opening a chat window,
          you send a message from your Python code and get the AI's response back as text
          your program can use.</p>

          <h3>What can you build with it?</h3>
          <p>Chatbots, writing assistants, code reviewers, data analyzers, game characters
          that can talk — anything that needs language understanding. That's what you're
          going to help dad build.</p>

          <div class="challenge">
            <div class="challenge-title">⚡ Mission 3 Challenge</div>
            <p>Open a browser and go to <strong>claude.ai</strong> (or ask dad which AI chat to use).
            Type this prompt:</p>
            <div class="code-block">
              <pre>Explain what a Python function is in 2 sentences, for a 13-year-old.</pre>
              <button class="copy-btn" onclick="copyCode(this)">copy</button>
            </div>
            <p>Read the answer. Does it make sense? When you're done, come back and mark it done.</p>
            <button class="hint-toggle" onclick="toggleHint(this)">show hint</button>
            <div class="hint-body">
              Open Firefox, go to claude.ai or chat.openai.com.
              Both require an account — ask dad to log in, or create an account together.
              Ask dad if you're not sure which one to use.
            </div>
          </div>
        `,
        quiz: [
          { q: 'What is a prompt?', options: ['A type of Python error', 'The message you send to an AI', 'A computer program', 'A database query'], answer: 1 },
          { q: 'What does API stand for?', options: ['Artificial Programming Intelligence', 'Application Programming Interface', 'Automated Process Integration', 'Advanced Python Interface'], answer: 1 },
          { q: 'What do LLMs predict?', options: ['The weather', 'Stock prices', 'The most helpful next word or sentence', 'Your password'], answer: 2 }
        ]
      },
      {
        id: 'm4',
        title: 'Your first API call',
        content: `
          <p>This is the big one. You're going to write a Python script that talks to
          Claude directly — no browser, just code.</p>

          <h3>Step 1: Get an API key</h3>
          <p>Ask dad for an Anthropic API key. It looks like:
          <code style="color:var(--green)">sk-ant-...</code>
          Keep it secret — never share it or put it on the internet.</p>

          <h3>Step 2: Install the library</h3>
          <p>In your terminal:</p>
          <div class="code-block">
            <pre>pip3 install anthropic</pre>
            <button class="copy-btn" onclick="copyCode(this)">copy</button>
          </div>

          <h3>Step 3: Write the script</h3>

          renderModules();
          const idx = MODULES.findIndex(m => m.id === moduleId);
          if (idx < MODULES.length - 1) {
            setTimeout(() => {
              const next = document.querySelectorAll('.module')[idx + 1];
              if (next) next.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 300);
          }
        }
      }, 500);
    }

    // ── Render ───────────────────────────────────────────────────────
    function renderModules() {
      const progress = getProgress();
      const container = document.getElementById('modules-container');
      container.innerHTML = '';
      let completedCount = 0;

      MODULES.forEach((mod, i) => {
        const isDone = !!progress[mod.id];
        const prevDone = i === 0 || !!progress[MODULES[i-1].id];
        const isUnlocked = prevDone;
        if (isDone) completedCount++;

        const el = document.createElement('div');
        el.className = 'module' +
          (isDone ? ' done' : '') +
          (isUnlocked ? ' unlocked' : ' locked');

        // Auto-open the first unlocked incomplete module
        const isCurrentModule = isUnlocked && !isDone;

        el.innerHTML = `
          <div class="module-header" onclick="toggleModule('mod-${mod.id}')">
            <span class="module-title">Mission ${i+1}: ${mod.title}</span>
            <span class="module-status">${isDone ? '✓ complete' : isUnlocked ? 'unlocked' : '🔒 locked'}</span>
          </div>
          <div class="module-body" id="mod-${mod.id}">
            ${mod.content}
            <div class="quiz-section" id="quiz-${mod.id}">
              ${isDone
                ? '<div class="quiz-passed">✓ Quiz passed</div>'
                : renderQuizQuestion(mod.id, mod.quiz || [])}
            </div>
            ${isDone ? renderIdeaBox(mod.id) : ''}
          </div>
        `;

        if (isCurrentModule || isDone) {
          el.classList.add('open');
        }

        // Keyboard accessibility: disable tabindex on locked module interactive children
        if (!isUnlocked) {
          el.querySelectorAll('button, a, input, select, textarea, [tabindex]').forEach(child => {
            child.setAttribute('tabindex', '-1');
          });
        }

        container.appendChild(el);
      });

      // Update progress bar
      const pct = MODULES.length ? (completedCount / MODULES.length) * 100 : 0;
      const bar = document.getElementById('progress-bar');
      bar.style.width = pct + '%';
      bar.setAttribute('aria-valuenow', Math.round(pct));
      document.getElementById('progress-label').textContent =
        completedCount + ' of ' + MODULES.length + ' modules complete';
      updateAskBarVisibility();
    }

    function toggleModule(bodyId) {
      const body = document.getElementById(bodyId);
      const card = body.closest('.module');
      if (card.classList.contains('locked')) return;
      card.classList.toggle('open');
    }

    function markDone(moduleId) {
      saveProgress(moduleId);
      renderModules();
      // Scroll to next module
      const idx = MODULES.findIndex(m => m.id === moduleId);
      if (idx < MODULES.length - 1) {
        setTimeout(() => {
          const next = document.querySelectorAll('.module')[idx + 1];
          if (next) next.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 300);
      }
    }

    function copyCode(btn) {
      const pre = btn.closest('.code-block').querySelector('pre');
      const text = pre.innerText;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
          btn.textContent = 'copied!';
          setTimeout(() => btn.textContent = 'copy', 1500);
        }).catch(() => {
          // Fallback: select text
          const range = document.createRange();
          range.selectNode(pre);
          window.getSelection().removeAllRanges();
          window.getSelection().addRange(range);
          btn.textContent = 'selected!';
          setTimeout(() => btn.textContent = 'copy', 1500);
        });
      } else {
        const range = document.createRange();
        range.selectNode(pre);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        btn.textContent = 'selected!';
        setTimeout(() => btn.textContent = 'copy', 1500);
      }
    }

    function toggleHint(btn) {
      const hint = btn.nextElementSibling;
      hint.classList.toggle('visible');
      btn.textContent = hint.classList.contains('visible') ? 'hide hint' : 'show hint';
    }

    // ── Ask-me-anything bar ────────────────────────────────────────────
    let askBarMode = 'question'; // 'key' | 'question'

    function updateAskBarVisibility() {
      const bar = document.getElementById('ask-bar');
      if (!m4Complete()) { bar.style.display = 'none'; document.body.classList.remove('ask-bar-visible'); return; }
      bar.style.display = 'block';
      document.body.classList.add('ask-bar-visible');
      if (!hasApiKey()) {
        askBarMode = 'key';
        document.getElementById('ask-bar-label').textContent = 'Enter your Anthropic API key to unlock Claude chat:';
        document.getElementById('ask-bar-input').placeholder = 'sk-ant-...';
        document.getElementById('ask-bar-input').type = 'password';
        document.getElementById('ask-bar-btn').textContent = 'Save →';
      } else {
        askBarMode = 'question';
        document.getElementById('ask-bar-label').textContent = 'Ask Claude anything about what you learned →';
        document.getElementById('ask-bar-input').placeholder = 'Type a question...';
        document.getElementById('ask-bar-input').type = 'text';
        document.getElementById('ask-bar-btn').textContent = 'Ask →';
      }
    }

    async function handleAskBar() {
      const input = document.getElementById('ask-bar-input');
      const btn = document.getElementById('ask-bar-btn');
      const errorEl = document.getElementById('ask-error');
      const val = input.value.trim();
      if (!val) return;
      errorEl.style.display = 'none';

      if (askBarMode === 'key') {
        localStorage.setItem('anthropicKey', val);
        input.value = '';
        updateAskBarVisibility();
        renderModules(); // re-render to update idea boxes
        return;
      }

      // Ask mode
      btn.textContent = 'thinking...';
      btn.disabled = true;
      input.disabled = true;

      try {
        const answer = await callClaude(
          val,
          'You are helping a 13-year-old learn programming and AI. Answer clearly in plain language, maximum 3 sentences.',
          256
        );
        addAskResponse(val, answer);
        input.value = '';
      } catch(e) {
        errorEl.textContent = 'Something went wrong — check your API key.';
        errorEl.style.display = 'block';
      } finally {
        btn.textContent = 'Ask →';
        btn.disabled = false;
        input.disabled = false;
        input.focus();
      }
    }

    function addAskResponse(question, answer) {
      const container = document.getElementById('ask-responses');
      const item = document.createElement('div');
      item.className = 'ask-response-item';
      const qLine = document.createElement('div');
      qLine.className = 'ask-response-q';
      qLine.textContent = 'You asked: ' + question;
      const aLine = document.createElement('div');
      aLine.textContent = answer;
      item.appendChild(qLine);
      item.appendChild(aLine);
      container.insertBefore(item, container.firstChild);
      // Keep max 3 responses
      while (container.children.length > 3) container.removeChild(container.lastChild);
    }

    // Allow Enter key in ask bar (ask-bar-input is already in DOM since HTML is before this script)
    document.getElementById('ask-bar-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleAskBar();
    });

    // Initial render
    renderModules();
  </script>
</body>
</html>
