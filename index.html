<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Engineer Training</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --bg2: #1a1a1a;
      --green: #00ff88;
      --green-dim: #00cc66;
      --grey: #444;
      --text: #cccccc;
      --font: 'Courier New', Courier, monospace;
      --code-bg: #111;
      --code-border: #333;
      --challenge-bg: #111a11;
      --hint-text: #aaa;
      --warn: #ff8844;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    h1 {
      color: var(--green);
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: var(--grey);
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }
    /* Progress bar */
    .progress-wrap {
      margin-bottom: 2.5rem;
    }
    .progress-label {
      color: var(--green-dim);
      font-size: 0.8rem;
      margin-bottom: 0.4rem;
    }
    .progress-bar-bg {
      background: var(--bg2);
      border: 1px solid var(--grey);
      height: 12px;
      border-radius: 6px;
      overflow: hidden;
    }
    .progress-bar-fill {
      background: var(--green);
      height: 100%;
      border-radius: 6px;
      transition: width 0.4s ease;
      width: 0%;
    }
    /* Module cards */
    .module {
      background: var(--bg2);
      border: 1px solid var(--grey);
      border-radius: 8px;
      margin-bottom: 1.5rem;
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .module.unlocked {
      border-color: var(--green-dim);
    }
    .module.locked {
      opacity: 0.45;
      pointer-events: none;
    }
    .module-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.2rem;
      cursor: pointer;
      user-select: none;
    }
    .module-title {
      color: var(--green);
      font-size: 1rem;
    }
    .module-status {
      font-size: 0.8rem;
      color: var(--grey);
    }
    .module.done .module-status { color: var(--green); }
    .module-body {
      padding: 0 1.2rem 1.2rem;
      display: none;
    }
    .module.open .module-body { display: block; }
    p { margin: 0.8rem 0; line-height: 1.6; font-size: 0.9rem; }
    h3 { color: var(--green-dim); margin: 1.2rem 0 0.5rem; font-size: 0.95rem; }
    /* Code blocks */
    .code-block {
      position: relative;
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      border-radius: 4px;
      margin: 0.8rem 0;
    }
    .code-block pre {
      padding: 0.8rem 1rem;
      overflow-x: auto;
      font-size: 0.85rem;
      color: var(--green);
      line-height: 1.5;
    }
    .copy-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      background: var(--grey);
      color: #fff;
      border: none;
      border-radius: 3px;
      padding: 2px 8px;
      font-size: 0.7rem;
      cursor: pointer;
      font-family: var(--font);
    }
    .copy-btn:hover { background: var(--green-dim); color: #000; }
    /* Challenge section */
    .challenge {
      background: var(--challenge-bg);
      border-left: 3px solid var(--green);
      border-radius: 0 4px 4px 0;
      padding: 0.8rem 1rem;
      margin: 1rem 0;
    }
    .challenge-title {
      color: var(--green);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.4rem;
    }
    /* Hint */
    .hint-toggle {
      background: none;
      border: 1px solid var(--grey);
      color: var(--grey);
      border-radius: 4px;
      padding: 3px 10px;
      font-size: 0.75rem;
      cursor: pointer;
      font-family: var(--font);
      margin-top: 0.6rem;
    }
    .hint-toggle:hover { border-color: var(--green-dim); color: var(--green-dim); }
    .hint-body {
      display: none;
      margin-top: 0.6rem;
      font-size: 0.85rem;
      color: var(--hint-text);
      line-height: 1.6;
    }
    .hint-body.visible { display: block; }
    /* Mark done button */
    .mark-done-btn {
      display: block;
      width: 100%;
      margin-top: 1.2rem;
      padding: 0.7rem;
      background: none;
      border: 2px solid var(--green);
      color: var(--green);
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      font-family: var(--font);
      transition: background 0.2s, color 0.2s;
    }
    .mark-done-btn:hover { background: var(--green); color: #000; }
    .mark-done-btn:disabled {
      border-color: var(--grey);
      color: var(--grey);
      cursor: default;
      background: none;
    }
    /* localStorage warning */
    .ls-warning {
      color: var(--warn);
      font-size: 0.75rem;
      padding: 0.5rem;
      border: 1px solid var(--warn);
      border-radius: 4px;
      margin-bottom: 1rem;
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>&gt; AI Engineer Training</h1>
    <p class="subtitle">5 missions. Complete them in order. No skipping.</p>
  </header>
  <div class="ls-warning" id="ls-warning">
    Warning: progress won't be saved in private/incognito mode.
  </div>
  <div class="progress-wrap">
    <div class="progress-label" id="progress-label">0 of 5 modules complete</div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Tutorial progress"></div>
    </div>
  </div>
  <div id="modules-container"></div>
  <script>
    // placeholder — logic added in Task 2
  </script>
</body>
</html>
